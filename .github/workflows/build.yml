name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      - name: Get dependencies
        working-directory: nearfind
        run: flutter pub get
      - name: Build APK
        working-directory: nearfind
        run: flutter build apk --debug
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: nearfind-apk
          path: nearfind/build/app/outputs/flutter-apk/app-debug.apk